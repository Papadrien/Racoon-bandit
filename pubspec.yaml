name: raccoon_bandit
description: Raccoon Bandit - Jeu multijoueur local.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  audioplayers: ^6.6.0
  wakelock_plus: ^1.4.0
  google_mobile_ads: ^8.0.0
  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.13.1
  firebase_analytics: ^11.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/cards/
    - assets/images/raccoon_bandit_hero.png
    - assets/images/card_front_raccoon.png
    - assets/images/card_front_trash.png
    - assets/images/card_front_food.png
    - assets/images/card_front_pince.png
    - assets/images/icon_trash.png
    - assets/images/icon_food.png
    # Nota : assets/sounds/ inclut automatiquement tous les .mp3 du dossier
    - assets/images/cards/card_back_purple.png
    - assets/images/cards/card_back_blue.png
    - assets/images/cards/card_back_green.png
    - assets/images/cards/card_back_pink.png
    - assets/images/cards/card_back_yellow.png

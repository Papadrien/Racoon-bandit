name: raccoon_bandit
description: Raccoon Bandit - Jeu multijoueur local.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  audioplayers: ^6.1.0
  wakelock_plus: ^1.3.4
  google_mobile_ads: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/cards/
    - assets/images/raccoon_bandit_hero.png
    # Nota : assets/sounds/ inclut automatiquement tous les .mp3 du dossier
    - assets/images/cards/card_back_purple.png
    - assets/images/cards/card_back_blue.png
    - assets/images/cards/card_back_green.png
    - assets/images/cards/card_back_pink.png
    - assets/images/cards/card_back_yellow.png

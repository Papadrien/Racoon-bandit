workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.junade.raccoonbandit  # ← à adapter
    
    scripts:
      - name: Install pods
        script: |
          cd ios && pod install

      - name: Flutter analyze
        script: |
          flutter analyze --no-fatal-infos

      - name: Flutter build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    # Pas de bloc publishing : upload manuel via Transporter

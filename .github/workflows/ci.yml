name: Raccoon Bandit CI/CD

on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Créer une release GitHub'
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.7'
  JAVA_VERSION: '21'

jobs:
  # ═══════════════════════════════════════════════
  # ANALYZE & TEST — sur toutes les branches/PR
  # ═══════════════════════════════════════════════
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.version }}
      app_build: ${{ steps.version.outputs.build }}
    steps:
      - uses: actions/checkout@v5

      - name: Extract version & generate build number
        id: version
        run: |
          # Version sémantique x.y.z lue depuis pubspec.yaml (source de vérité)
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          # Build number = timestamp Unix : strictement croissant à chaque run CI
          BUILD=$(date +%s)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "📦 Version : $VERSION | 🕒 Build : $BUILD"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - run: flutter pub get
      - run: dart format .
      - run: flutter analyze --no-fatal-infos
      - run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 7
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════
  # BUILD DEBUG — develop uniquement
  # ═══════════════════════════════════════════════
  build-android-debug:
    name: Build Android (Debug)
    needs: analyze
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: flutter pub get

      - name: Build APK (Debug)
        run: flutter build apk --debug --no-pub

      - name: Rename artifact
        run: |
          VERSION=${{ needs.analyze.outputs.app_version }}
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-debug.apk "dist/RaccoonBandit-${VERSION}-debug.apk"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: dist/*
          retention-days: 14

  # ═══════════════════════════════════════════════
  # BUILD RELEASE — master & tags
  # ═══════════════════════════════════════════════
  build-android-release:
    name: Build Android (Release)
    needs: analyze
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            echo "$KEY_PROPERTIES" > android/key.properties
            echo "✅ Signing release (secrets)"
          else
            keytool -genkey -v -keystore android/app/keystore.jks \
              -alias raccoonbandit-debug -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass raccoonbandit-debug-pwd -keypass raccoonbandit-debug-pwd \
              -dname "CN=RaccoonBandit Debug, OU=Dev, O=RaccoonBandit, L=Paris, C=FR" 2>/dev/null
            printf 'storePassword=raccoonbandit-debug-pwd\nkeyPassword=raccoonbandit-debug-pwd\nkeyAlias=raccoonbandit-debug\nstoreFile=keystore.jks\n' > android/key.properties
            echo "✅ Signing debug stable (sans secrets)"
          fi

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-pub --build-name=${{ needs.analyze.outputs.app_version }} --build-number=${{ needs.analyze.outputs.app_build }}

      - name: Build App Bundle
        run: flutter build appbundle --release --no-pub --build-name=${{ needs.analyze.outputs.app_version }} --build-number=${{ needs.analyze.outputs.app_build }}

      - name: Rename artifacts
        run: |
          VERSION=${{ needs.analyze.outputs.app_version }}
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/RaccoonBandit-${VERSION}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "dist/RaccoonBandit-${VERSION}.aab"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/*
          retention-days: 30

  # ═══════════════════════════════════════════════
  # RELEASE GITHUB — tags & manual dispatch
  # ═══════════════════════════════════════════════
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    needs: [analyze, build-android-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create tag (if manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION=${{ needs.analyze.outputs.app_version }}
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "TAG_NAME=$TAG" >> $GITHUB_ENV

      - name: Set tag name (if tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG_NAME" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          CHANGELOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges 2>/dev/null || echo "- Release initiale")
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: android-release
          path: ./artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Raccoon Bandit ${{ env.TAG_NAME }}"
          body: |
            ## 🦝 Raccoon Bandit ${{ env.TAG_NAME }}

            **Version** : `${{ needs.analyze.outputs.app_version }}` | **Build** : `${{ needs.analyze.outputs.app_build }}`

            ### 📋 Changements
            ${{ steps.changelog.outputs.changelog }}

            ### 📦 Téléchargements
            - **APK** : Installation directe sur Android
            - **AAB** : Pour le Google Play Store
          files: |
            artifacts/*
          draft: false
          prerelease: false

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    // Le plugin Flutter Gradle DOIT être appliqué après les plugins Android et Kotlin.
    id "dev.flutter.flutter-gradle-plugin"
    // Google Services — lit google-services.json et configure Firebase
    id "com.google.gms.google-services"
}

android {
    namespace "fr.junade.raccoonbandit"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId "fr.junade.raccoonbandit"
        minSdk 24
        targetSdk 36
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            // Signing debug par défaut pour permettre `flutter run --release` localement.
            // En CI/release Play Store, surcharger via android/key.properties.
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            // Si minifyEnabled est activé plus tard, inclure les règles Firebase :
            // proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source "../.."
}

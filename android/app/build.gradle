plugins {
    id "com.android.application"
    // Le plugin Flutter Gradle DOIT être appliqué après les plugins Android et Kotlin.
    id "dev.flutter.flutter-gradle-plugin"
    // Google Services — lit google-services.json et configure Firebase
    id "com.google.gms.google-services"
    // Crashlytics — upload des symboles de débogage pour les stack traces lisibles
    id "com.google.firebase.crashlytics"
}

def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "fr.junade.raccoonbandit"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile     file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias      keystoreProperties['keyAlias']
                keyPassword   keystoreProperties['keyPassword']
            }
        }
    }

    defaultConfig {
        applicationId "fr.junade.raccoonbandit"
        minSdk 24
        targetSdk 36
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            // Utilise le signing release si key.properties est présent (CI/Play Store),
            // sinon replie sur le signing debug local (flutter run --release).
            signingConfig keystorePropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            // Si minifyEnabled est activé plus tard, inclure les règles Firebase :
            // proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "androidx.core:core-splashscreen:1.0.1"
}
